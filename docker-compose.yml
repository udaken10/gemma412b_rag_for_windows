services:
  app:
    build: .
    container_name: rag_gemma4_container
    ports:
      - "7860:7860" # Gradioç”¨
      - "5000:5000" # Flaskç”¨
      - "21:21" # FTPç”¨
      - "21000-21010:21000-21010" # FTPăƒ‘ăƒƒă‚·ăƒ–ç”¨
    volumes:
      - .:/app
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: bash -c "source /opt/venv/bin/activate && python -m pyftpdlib -p 21 -w -d /app/data/documents & python backend/app.py & python frontend/app.py && wait -n"
    tty: true
    stdin_open: true
