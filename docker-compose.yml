services:
  app:
    build: .
    container_name: rag_gemma4_container
    ports:
      - "7860:7860" # Gradio用
      - "5000:5000" # Flask用
    volumes:
      - .:/app
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: bash -c "source /opt/venv/bin/activate && python backend/app.py & python frontend/app.py && wait -n"
    tty: true
    stdin_open: true
